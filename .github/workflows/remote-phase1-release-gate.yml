name: remote-phase1-release-gate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'remote/**'
      - '.github/workflows/remote-phase1-release-gate.yml'
      - 'backend/tests/test_remote_phase1_pr*.py'
      - 'backend/tests/test_remote_phase0_*.py'

jobs:
  remote-backend-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install backend + gate dependencies
        run: python -m pip install fastapi uvicorn sqlalchemy pydantic pydantic-settings pyyaml pytest httpx
      - name: Export runtime OpenAPI
        run: python remote/remote-shared/scripts/compat-harness/export_phase1_openapi.py
      - name: Rebuild phase1 manifest
        run: python remote/remote-shared/scripts/compat-harness/build_phase1_manifest.py
      - name: Run phase1 compatibility gate
        run: python remote/remote-shared/scripts/compat-harness/validate_phase1_gate.py
      - name: Run remote backend regression
        run: pytest backend/tests/test_remote_phase0_bootstrap.py backend/tests/test_remote_phase0_contract_freeze.py backend/tests/test_remote_phase0_compatibility_gate.py backend/tests/test_remote_phase1_pr1_login.py backend/tests/test_remote_phase1_pr2_lifecycle.py backend/tests/test_remote_phase1_pr3_admin.py backend/tests/test_remote_phase1_pr4_gate.py -q

  remote-admin-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install frontend toolchain dependency
        run: npm --prefix frontend ci
      - name: Run remote-admin gate
        run: |
          npm --prefix remote/remote-admin run typecheck
          npm --prefix remote/remote-admin run build
          npm --prefix remote/remote-admin run test
