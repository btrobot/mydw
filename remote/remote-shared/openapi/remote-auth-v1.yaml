            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Authorization blocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /self/devices:
    get:
      summary: Current user devices
      security:
      - BearerAuth: []
      parameters:
      - in: query
        name: limit
        required: false
        schema:
          default: 20
          maximum: 100
          minimum: 1
          title: Limit
          type: integer
      - in: query
        name: offset
        required: false
        schema:
          default: 0
          minimum: 0
          title: Offset
          type: integer
      responses:
        '200':
          description: Current user devices
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SelfDeviceListResponse'
        '401':
          description: Expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Authorization blocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422': *id001
  /self/sessions:
    get:
      summary: Current user sessions
      security:
      - BearerAuth: []
      parameters:
      - in: query
        name: limit
        required: false
        schema:
          default: 20
          maximum: 100
          minimum: 1
          title: Limit
          type: integer
      - in: query
        name: offset
        required: false
        schema:
          default: 0
          minimum: 0
          title: Offset
          type: integer
      responses:
        '200':
          description: Current user sessions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SelfSessionListResponse'
        '401':
          description: Expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Authorization blocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422': *id001
  /self/activity:
    get:
      summary: Current user recent activity
      security:
      - BearerAuth: []
      parameters:
      - in: query
        name: limit
        required: false
        schema:
          default: 20
          maximum: 100
          minimum: 1
          title: Limit
          type: integer
      - in: query
        name: offset
        required: false
        schema:
          default: 0
          minimum: 0
          title: Offset
          type: integer
      responses:
        '200':
          description: Current user recent activity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SelfActivityListResponse'
        '401':
          description: Expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Authorization blocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422': *id001
  /self/sessions/{session_id}/revoke:
    post:
      summary: Current user revoke own session
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Current user session revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SelfSessionRevokeResponse'
        '401':
          description: Expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Authorization blocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Requested session unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422': *id001
  /admin/users:
    get:
      summary: Admin list users
      security:
      - BearerAuth: []
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserListResponse'
        '401':
          description: Expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin access forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422': *id001
      parameters:
      - in: query
        name: q
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Q
      - in: query
        name: status
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Status
      - in: query
        name: license_status
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: License Status
      - in: query
        name: limit
        required: false
        schema:
          anyOf:
          - maximum: 200
            minimum: 1
            type: integer
          - type: 'null'
          title: Limit
      - in: query
        name: offset
        required: false
        schema:
          default: 0
          minimum: 0
          title: Offset
          type: integer
    post:
      summary: Admin create user
      security:
      - BearerAuth: []
      parameters:
      - in: header
        name: X-Step-Up-Token
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Step-Up-Token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserCreateRequest'
      responses:
        '200':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserResponse'
        '401':
          description: Expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin access forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422': *id001
  /admin/users/{user_id}:
    get:
      summary: Admin get user
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserResponse'
        '401':
          description: Expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin access forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Requested resource missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422': *id001
    patch:
      summary: Admin update user
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserUpdateRequest'
      parameters:
      - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserResponse'
        '401':
          description: Expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin access forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Requested resource missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422': *id001
  /admin/users/{user_id}/revoke:
    post:
      summary: Admin revoke user
