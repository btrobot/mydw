          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminActionResponse'
        '401':
          description: Expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin access forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Requested resource missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422': *id001
  /admin/devices/{device_id}/rebind:
    post:
      summary: Admin rebind device
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminDeviceRebindRequest'
      parameters:
      - $ref: '#/components/parameters/DeviceId'
      responses:
        '200':
          description: Device rebound
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminActionResponse'
        '401':
          description: Expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin access forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Requested resource missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422': *id001
  /admin/sessions:
    get:
