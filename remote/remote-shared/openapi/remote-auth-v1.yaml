            application/json:
              schema:
                $ref: '#/components/schemas/AdminSessionListResponse'
        '401':
          description: Expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin access forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422': *id001
      parameters:
      - in: query
        name: q
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Q
      - in: query
        name: auth_state
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Auth State
      - in: query
        name: user_id
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: User Id
      - in: query
        name: device_id
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
