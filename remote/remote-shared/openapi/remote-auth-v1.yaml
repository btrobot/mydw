        '403':
          description: Admin access forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Requested resource missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422': *id001
  /admin/devices:
    get:
      summary: Admin list devices
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Device list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDeviceListResponse'
        '401':
