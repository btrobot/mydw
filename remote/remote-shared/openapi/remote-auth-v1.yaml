      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Session revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminActionResponse'
        '401':
          description: Expired token
