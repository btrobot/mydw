  /admin/audit-logs:
    get:
      summary: Admin list audit logs
      security:
      - BearerAuth: []
      parameters:
      - in: query
        name: event_type
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Event Type
      - in: query
        name: actor_id
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Actor Id
      - in: query
        name: target_user_id
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Target User Id
      - in: query
        name: target_device_id
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Target Device Id
      - in: query
        name: target_session_id
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Target Session Id
      - in: query
        name: created_from
        required: false
        schema:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Created From
      - in: query
        name: created_to
        required: false
        schema:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Created To
      - in: query
        name: limit
        required: false
        schema:
          default: 50
          maximum: 200
          minimum: 1
          title: Limit
          type: integer
      - in: query
        name: offset
        required: false
        schema:
          default: 0
          minimum: 0
          title: Offset
          type: integer
      responses:
        '200':
          description: Audit log list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogListResponse'
        '401':
          description: Expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin access forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422': *id001
  /admin/metrics/summary:
    get:
      summary: Admin metrics summary
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Metrics summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminMetricsSummaryResponse'
        '401':
          description: Expired token
          content:
            application/json:
              schema:
