        '404':
          description: Requested resource missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422': *id001
  /admin/users/{user_id}/restore:
    post:
      summary: Admin restore user
      security:
      - BearerAuth: []
      parameters:
