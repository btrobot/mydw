server {
  listen 80;
  server_name _;

  location = /health {
    proxy_pass http://remote-backend:8100/health;
  }

  location /api/ {
    proxy_pass http://remote-backend:8100/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /admin/ {
    proxy_pass http://remote-admin:80/;
  }

  # The future portal surface remains B0-owned. Route shape or hostname
  # decisions must be finalized by self-service planning before enablement.
}
