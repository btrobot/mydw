services:
  reverse-proxy:
    image: nginx:1.27-alpine
    depends_on:
      remote-backend:
        condition: service_healthy
      remote-admin:
        condition: service_started
    ports:
      - "${REMOTE_DEPLOY_HTTP_PORT:-80}:80"
    restart: unless-stopped
    volumes:
      - ./nginx.remote-full-system-linux.conf:/etc/nginx/conf.d/default.conf:ro

  remote-backend:
    build:
      context: ../../remote-backend
      dockerfile: Dockerfile
    env_file:
      - ../../../.env
    environment:
      REMOTE_BACKEND_APP_ENV: ${REMOTE_BACKEND_APP_ENV:-staging}
      REMOTE_BACKEND_HOST: 0.0.0.0
      REMOTE_BACKEND_PORT: 8100
      REMOTE_BACKEND_DATABASE_URL: ${REMOTE_BACKEND_DATABASE_URL:-sqlite:////data/remote_auth.db}
      REMOTE_BACKEND_LOGIN_RATE_LIMIT_BACKEND: ${REMOTE_BACKEND_LOGIN_RATE_LIMIT_BACKEND:-sqlite}
      REMOTE_BACKEND_LOGIN_RATE_LIMIT_SQLITE_PATH: ${REMOTE_BACKEND_LOGIN_RATE_LIMIT_SQLITE_PATH:-/data/login_rate_limits.sqlite3}
    expose:
      - "8100"
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8100/health').status == 200 else 1)"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    volumes:
      - remote-data:/data

  remote-admin:
    build:
      context: ../../remote-admin
      dockerfile: Dockerfile
    environment:
      REMOTE_ADMIN_API_BASE_URL: ${REMOTE_ADMIN_API_BASE_URL:-/api}
    restart: unless-stopped

  remote-portal:
    image: nginx:1.27-alpine
    profiles:
      - portal
    depends_on:
      - remote-backend
    # Reserved for the future portal artifact.
    # Enable only after B0/B work lands and a static build exists.

volumes:
  remote-data:
