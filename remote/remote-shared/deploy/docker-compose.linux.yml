services:
  reverse-proxy:
    image: ${REMOTE_NGINX_RUNTIME_IMAGE:-nginx:1.27-alpine}
    depends_on:
      remote-backend:
        condition: service_healthy
      remote-admin:
        condition: service_started
    ports:
      - "${REMOTE_DEPLOY_HTTP_PORT:-80}:80"
      - "${REMOTE_DEPLOY_HTTPS_PORT:-443}:443"
    restart: unless-stopped
    volumes:
      - ./nginx.remote-full-system.generated.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro

  remote-backend:
    build:
      context: ../../remote-backend
      dockerfile: Dockerfile
      args:
        REMOTE_PYTHON_BASE_IMAGE: ${REMOTE_PYTHON_BASE_IMAGE:-python:3.12-slim}
        REMOTE_PIP_INDEX_URL: ${REMOTE_PIP_INDEX_URL:-https://pypi.org/simple}
        REMOTE_PIP_TRUSTED_HOST: ${REMOTE_PIP_TRUSTED_HOST:-}
    env_file:
      - path: ../../../remote/.env.linux.example
        required: true
      - path: ../../../.env
        required: false
    environment:
      REMOTE_BACKEND_APP_ENV: ${REMOTE_BACKEND_APP_ENV:-staging}
      REMOTE_BACKEND_HOST: 0.0.0.0
      REMOTE_BACKEND_PORT: 8100
      REMOTE_BACKEND_DATABASE_URL: ${REMOTE_BACKEND_DATABASE_URL:-sqlite:////data/remote_auth.db}
      REMOTE_BACKEND_LOGIN_RATE_LIMIT_BACKEND: ${REMOTE_BACKEND_LOGIN_RATE_LIMIT_BACKEND:-sqlite}
      REMOTE_BACKEND_LOGIN_RATE_LIMIT_SQLITE_PATH: ${REMOTE_BACKEND_LOGIN_RATE_LIMIT_SQLITE_PATH:-/data/login_rate_limits.sqlite3}
    expose:
      - "8100"
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8100/health').status == 200 else 1)"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    volumes:
      - remote-data:/data

  remote-admin:
    build:
      context: ../../remote-admin
      dockerfile: Dockerfile
      args:
        REMOTE_NODE_BASE_IMAGE: ${REMOTE_NODE_BASE_IMAGE:-node:20-alpine}
        REMOTE_NGINX_BASE_IMAGE: ${REMOTE_NGINX_BASE_IMAGE:-nginx:1.27-alpine}
        REMOTE_NPM_REGISTRY: ${REMOTE_NPM_REGISTRY:-https://registry.npmjs.org}
    environment:
      REMOTE_ADMIN_API_BASE_URL: ${REMOTE_ADMIN_API_BASE_URL:-/api}
    restart: unless-stopped

  remote-portal:
    image: ${REMOTE_NGINX_RUNTIME_IMAGE:-nginx:1.27-alpine}
    profiles:
      - portal
    depends_on:
      - remote-backend
    # Reserved for the future portal artifact.
    # Enable only after B0/B work lands and a static build exists.

volumes:
  remote-data:
