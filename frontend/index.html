<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>得物掘金工具</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // HashRouter deep-link redirect for http(s) static hosting only.
      // In Electron packaged mode the app is loaded from file://.../index.html;
      // redirecting that pathname would incorrectly produce file:///.../#/.../index.html
      ;(function () {
        var protocol = location.protocol
        var pathname = location.pathname || '/'
        var isFileProtocol = protocol === 'file:'
        var isIndexDocument = /\/index\.html?$/.test(pathname)

        if (isFileProtocol || isIndexDocument || location.hash) {
          return
        }

        location.replace('/' + '#' + pathname + location.search)
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
